<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>卡密验证模板工厂 · 全能导出（防下载失败）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f9 0%, #dfe6f0 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .generator-container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .gen-header {
            background: linear-gradient(135deg, #1e2f3f 0%, #0f212f 100%);
            padding: 1.8rem 2rem;
            color: white;
        }

        .gen-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gen-header p {
            opacity: 0.8;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .config-panel {
            display: flex;
            flex-wrap: wrap;
        }

        .form-section {
            flex: 1.2;
            padding: 2rem 2rem 2rem 2rem;
            background: #ffffff;
            border-right: 1px solid #eef2f8;
        }

        .preview-section {
            flex: 1;
            background: #fafcff;
            padding: 2rem 1.8rem;
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 1.6rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #1e4663;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1.2rem;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: monospace;
            background: #fff;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #2c5f8a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(44,95,138,0.15);
        }

        .help-tip {
            font-size: 0.7rem;
            color: #6f8eae;
            margin-top: 0.4rem;
        }

        .btn-generate {
            background: linear-gradient(100deg, #2c5f8a, #1f4a6e);
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 3rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.8rem;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        /* 多种导出区域 - 防下载失败 */
        .export-toolbar {
            background: #eef2fa;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .export-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #1e4663;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .export-btn {
            background: white;
            border: 1px solid #cbdde9;
            padding: 0.6rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #1f4665;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 1 0 auto;
            justify-content: center;
        }

        .export-btn-primary {
            background: #2c5f8a;
            border-color: #2c5f8a;
            color: white;
        }

        .export-btn-primary:hover {
            background: #1f4a6e;
            transform: scale(0.97);
        }

        .export-btn:hover {
            background: #e2e9f3;
            transform: translateY(-1px);
        }

        .code-output {
            background: #1e2a36;
            color: #e2f0fa;
            border-radius: 1.2rem;
            padding: 1rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.7rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 380px;
            overflow: auto;
            border: 1px solid #2d3e4e;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2f3c;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: opacity 0.2s;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
        }

        @media (max-width: 780px) {
            .config-panel {
                flex-direction: column;
            }
            .form-section {
                border-right: none;
                border-bottom: 1px solid #eef2f8;
            }
            body {
                padding: 1rem;
            }
            .toast-msg {
                white-space: normal;
                text-align: center;
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="generator-container">
    <div class="gen-header">
        <h1>🔐 卡密验证模板工厂 | 7种防失效下载</h1>
        <p>配置网站地址 · 有效卡密 · 获取卡密链接 → 生成HTML → 多种下载/复制方式（兼容所有浏览器）</p>
    </div>
    <div class="config-panel">
        <!-- 左侧配置表单 -->
        <div class="form-section">
            <div class="form-group">
                <label>🌐 目标网站地址 (iframe嵌入)</label>
                <input type="url" id="targetUrl" placeholder="https://www.example.com" value="https://www.example.com">
                <div class="help-tip">⚠️ 注意：部分网站禁止iframe嵌入，建议使用允许嵌入的测试地址 (如 example.com)</div>
            </div>

            <div class="form-group">
                <label>🔑 有效卡密 (每行一个)</label>
                <textarea id="keysList" rows="3" placeholder="每行一个卡密，例如:&#10;DEMO123&#10;VIP888&#10;KAMI2024&#10;TEST2026"></textarea>
                <div class="help-tip">✨ 验证时不区分大小写，自动去除空格</div>
            </div>

            <div class="form-group">
                <label>📞 获取卡密链接 (按钮跳转)</label>
                <input type="text" id="contactLink" placeholder="https://qm.qq.com/q/HC7vmzCysM 或 其他链接" value="https://qm.qq.com/q/HC7vmzCysM">
                <div class="help-tip">用户点击「获取卡密」按钮跳转此链接</div>
            </div>

            <div class="form-group">
                <label>🎨 弹窗标题 & 提示文字</label>
                <input type="text" id="modalTitle" placeholder="卡密验证" value="卡密验证">
                <input type="text" id="descText" placeholder="请输入有效的卡密以继续访问网站" value="请输入有效的卡密以继续访问网站" style="margin-top: 8px;">
            </div>

            <button id="generateBtn" class="btn-generate">✨ 生成最新模板 & 刷新预览</button>
        </div>

        <!-- 右侧预览 + 多种下载方式 -->
        <div class="preview-section">
            <div class="export-toolbar">
                <div class="export-title">📥 多种下载方式 (防下载失败)</div>
                <div class="button-group">
                    <button id="downloadBlobBtn" class="export-btn export-btn-primary">💾 方式1: Blob下载</button>
                    <button id="downloadDataUrlBtn" class="export-btn">📎 方式2: DataURL下载</button>
                    <button id="downloadFileSaverBtn" class="export-btn">🔄 方式3: FileSaver备用</button>
                </div>
                <div class="button-group">
                    <button id="copyHtmlCodeBtn" class="export-btn">📋 方式4: 复制代码(原始)</button>
                    <button id="copyMinifiedBtn" class="export-btn">⚡ 方式5: 复制压缩版</button>
                    <button id="saveAsHtmlBtn" class="export-btn">💿 方式6: 另存为 .html</button>
                    <button id="fallbackCopyBtn" class="export-btn">📄 方式7: 弹窗全选复制</button>
                </div>
                <div class="help-tip" style="margin-top: 8px; text-align:center;">✔️ 若某方式失败，请尝试其他方式，兼容所有浏览器及移动端。</div>
            </div>

            <div style="font-size: 0.7rem; margin-bottom: 0.5rem; color:#4a627a; display: flex; justify-content: space-between;">
                <span>📄 生成的HTML代码 (实时预览)</span>
                <span id="codeStats"></span>
            </div>
            <div id="codeOutput" class="code-output" contenteditable="false"></div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✅ 操作成功</div>

<script>
    (function() {
        // DOM 元素
        const targetUrlInput = document.getElementById('targetUrl');
        const keysListTextarea = document.getElementById('keysList');
        const contactLinkInput = document.getElementById('contactLink');
        const modalTitleInput = document.getElementById('modalTitle');
        const descTextInput = document.getElementById('descText');
        const generateBtn = document.getElementById('generateBtn');
        const codeOutputDiv = document.getElementById('codeOutput');
        const codeStatsSpan = document.getElementById('codeStats');
        const toast = document.getElementById('toastMsg');

        // 下载按钮
        const downloadBlobBtn = document.getElementById('downloadBlobBtn');
        const downloadDataUrlBtn = document.getElementById('downloadDataUrlBtn');
        const downloadFileSaverBtn = document.getElementById('downloadFileSaverBtn');
        const copyHtmlCodeBtn = document.getElementById('copyHtmlCodeBtn');
        const copyMinifiedBtn = document.getElementById('copyMinifiedBtn');
        const saveAsHtmlBtn = document.getElementById('saveAsHtmlBtn');
        const fallbackCopyBtn = document.getElementById('fallbackCopyBtn');

        // 默认卡密列表
        const DEFAULT_KEYS = ['DEMO123', 'VIP888', 'KAMI2024', 'TEST2026'];
        
        // 显示提示
        function showToast(msg, isError = false) {
            toast.textContent = msg || (isError ? '❌ 操作失败' : '✅ 操作成功');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }

        // 解析有效卡密数组
        function parseKeyList(raw) {
            let lines = raw.split(/\r?\n/);
            let keys = [];
            for (let line of lines) {
                let trimmed = line.trim();
                if (trimmed !== "") {
                    keys.push(trimmed);
                }
            }
            if (keys.length === 0) return DEFAULT_KEYS;
            return [...new Map(keys.map(k => [k.toUpperCase(), k])).values()];
        }

        // 防XSS转义 (用于生成HTML内部)
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // 生成完整HTML模板 (基于当前配置)
        function generateFullHTML() {
            let targetSite = targetUrlInput.value.trim();
            if (!targetSite) targetSite = "https://www.example.com";
            if (!targetSite.startsWith('http://') && !targetSite.startsWith('https://')) {
                targetSite = 'https://' + targetSite;
            }

            let rawKeys = keysListTextarea.value;
            let keyArray = parseKeyList(rawKeys);
            if (keyArray.length === 0) keyArray = DEFAULT_KEYS;
            
            let contactUrl = contactLinkInput.value.trim();
            if (!contactUrl) contactUrl = "https://qm.qq.com/q/HC7vmzCysM";
            if (!contactUrl.startsWith('http://') && !contactUrl.startsWith('https://')) {
                contactUrl = 'https://' + contactUrl;
            }
            
            let modalTitle = modalTitleInput.value.trim() || "卡密验证";
            let descPlaceholder = descTextInput.value.trim() || "请输入有效的卡密以继续访问网站";
            let validKeysJson = JSON.stringify(keyArray);
            
            // 构建最终html (独立页面)
            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>${escapeHtml(modalTitle)} - 访问受限</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        .iframe-wrapper{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
        iframe{width:100%;height:100%;border:none;display:block;}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;visibility:visible;opacity:1;transition:opacity 0.3s,visibility 0.3s;}
        .modal-overlay.hidden{visibility:hidden;opacity:0;pointer-events:none;}
        .modal-card{background:#fff;max-width:90%;width:460px;border-radius:36px;box-shadow:0 40px 60px rgba(0,0,0,0.4);overflow:hidden;animation:fadeInUp 0.35s ease;font-family:'Segoe UI',system-ui,sans-serif;}
        .card-header{padding:28px 28px 0;text-align:center;}
        .card-header h2{font-size:1.9rem;font-weight:800;background:linear-gradient(135deg,#1f3b4c,#2c5f8a);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .lock-icon{font-size:3rem;margin-bottom:8px;}
        .card-body{padding:24px 28px 32px;}
        .desc-text{color:#2c3e50;text-align:center;margin-bottom:24px;font-weight:500;}
        .input-group{margin-bottom:20px;}
        .input-group label{font-weight:600;color:#1e4663;margin-bottom:8px;display:block;}
        .card-input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:28px;outline:none;font-family:monospace;background:#fff;}
        .card-input:focus{border-color:#2c5f8a;box-shadow:0 0 0 3px rgba(44,95,138,0.2);}
        .error-msg{background:#fee2e2;color:#b91c1c;padding:10px;border-radius:60px;font-size:0.8rem;text-align:center;display:none;margin-top:12px;}
        .error-msg.show{display:block;}
        .btn-verify{background:linear-gradient(100deg,#2c5f8a,#1f4a6e);width:100%;padding:14px;border:none;border-radius:44px;color:white;font-weight:700;cursor:pointer;margin-top:12px;}
        .btn-verify:hover{transform:scale(0.98);}
        .get-card-link{text-align:center;margin-top:20px;border-top:1px solid #edf2f7;padding-top:18px;}
        .get-card-btn{display:inline-block;background:#f0f4f9;color:#2c5f8a;text-decoration:none;font-size:0.85rem;font-weight:600;padding:8px 24px;border-radius:40px;border:1px solid #cddae9;}
        .get-card-btn:hover{background:#e6edf6;}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        @media(max-width:550px){.modal-card{width:92%;}.card-header h2{font-size:1.5rem;}}
    </style>
</head>
<body>
    <div class="iframe-wrapper">
        <iframe src="${escapeHtml(targetSite)}" title="目标网站"></iframe>
    </div>
    <div id="cardOverlay" class="modal-overlay">
        <div class="modal-card">
            <div class="card-header"><div class="lock-icon">🔐</div><h2>${escapeHtml(modalTitle)}</h2></div>
            <div class="card-body">
                <div class="desc-text">${escapeHtml(descPlaceholder)}</div>
                <div class="input-group"><label>卡密 (兑换码)</label><input type="text" id="cardKey" class="card-input" placeholder="输入卡密" autocomplete="off"></div>
                <div id="errorMsg" class="error-msg">⚠️ 卡密无效</div>
                <button id="verifyBtn" class="btn-verify">验证并进入</button>
                <div class="get-card-link"><a href="${escapeHtml(contactUrl)}" target="_blank" rel="noopener noreferrer" class="get-card-btn">🎫 获取卡密</a></div>
            </div>
        </div>
    </div>
    <script>
        (function(){
            const overlay=document.getElementById('cardOverlay');
            const verifyBtn=document.getElementById('verifyBtn');
            const cardInput=document.getElementById('cardKey');
            const errorDiv=document.getElementById('errorMsg');
            const validKeys = ${validKeysJson};
            function normalizeKey(s){ return s.trim().toUpperCase().replace(/\\s/g,''); }
            function validateCard(k){ if(!k) return false; return validKeys.includes(normalizeKey(k)); }
            function showError(t){ errorDiv.textContent=t||'卡密无效'; errorDiv.classList.add('show'); setTimeout(()=>errorDiv.classList.remove('show'),2500); }
            function unlock(){ overlay.classList.add('hidden'); overlay.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
            function handle(){
                let raw=cardInput.value;
                if(!raw){ showError('❌ 请输入卡密'); return; }
                if(validateCard(raw)){ unlock(); }else{ showError('❌ 卡密无效，无法访问'); cardInput.value=''; cardInput.focus(); }
            }
            verifyBtn.addEventListener('click',handle);
            cardInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); handle(); } });
            if(overlay){ overlay.addEventListener('click',(e)=>{ if(e.target===overlay) showError('请先输入有效卡密'); }); }
            document.body.style.overflow='hidden';
        })();
    <\/script>
</body>
</html>`;
        }

        // 当前缓存的代码
        let currentRawHTML = '';

        // 刷新预览和缓存
        function updatePreviewAndCache() {
            currentRawHTML = generateFullHTML();
            codeOutputDiv.textContent = currentRawHTML;
            const len = currentRawHTML.length;
            codeStatsSpan.textContent = `代码大小: ${len} 字符 | ${(len/1024).toFixed(1)} KB`;
        }

        // ---------- 七种下载/导出方式 ----------
        
        // 方式1: Blob 下载 (标准)
        function downloadAsBlob() {
            if (!currentRawHTML) updatePreviewAndCache();
            const blob = new Blob([currentRawHTML], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `card_verify_${Date.now()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✅ 方式1: Blob下载成功');
        }

        // 方式2: DataURL 下载 (data:application/octet-stream)
        function downloadAsDataURL() {
            if (!currentRawHTML) updatePreviewAndCache();
            const dataStr = "data:text/html;charset=utf-8," + encodeURIComponent(currentRawHTML);
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = `card_html_${Date.now()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('📎 方式2: DataURL下载触发');
        }

        // 方式3: 模拟FileSaver (通过Blob + saveAs 的降级，实际仍用Blob但提供不同尝试)
        function downloadFileSaverFallback() {
            if (!currentRawHTML) updatePreviewAndCache();
            try {
                const blob = new Blob([currentRawHTML], {type: 'text/html'});
                // 使用 msSaveBlob (IE/Edge legacy)
                if (window.navigator && window.navigator.msSaveBlob) {
                    window.navigator.msSaveBlob(blob, `card_verify_${Date.now()}.html`);
                    showToast('🔄 方式3: msSaveBlob 成功');
                } else {
                    // 创建对象URL再次尝试 (类似blob但兼容更多)
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `card_fallback_${Date.now()}.html`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    showToast('🔄 方式3: 备用链接下载');
                }
            } catch(e) {
                showToast('❌ 方式3失败，尝试其他方式', true);
            }
        }

        // 方式4: 复制原始代码到剪贴板
        async function copyRawCode() {
            if (!currentRawHTML) updatePreviewAndCache();
            try {
                await navigator.clipboard.writeText(currentRawHTML);
                showToast('📋 原始代码已复制 (方式4)');
            } catch(err) {
                fallbackCopyText(currentRawHTML);
            }
        }
        
        // 方式5: 复制压缩版(移除多余空白)
        function getMinifiedHTML() {
            if (!currentRawHTML) updatePreviewAndCache();
            return currentRawHTML.replace(/\s+/g, ' ').replace(/>\s+</g, '><').trim();
        }
        async function copyMinified() {
            const minified = getMinifiedHTML();
            try {
                await navigator.clipboard.writeText(minified);
                showToast('⚡ 压缩版代码已复制 (方式5)');
            } catch(err) {
                fallbackCopyText(minified);
            }
        }

        // 方式6: 另存为 .html (通过showSaveFilePicker 现代API，兼容降级)
        async function saveAsModern() {
            if (!currentRawHTML) updatePreviewAndCache();
            // 尝试使用 File System Access API
            if ('showSaveFilePicker' in window) {
                try {
                    const opts = {
                        types: [{
                            description: 'HTML文件',
                            accept: {'text/html': ['.html']}
                        }],
                        suggestedName: `card_verify_${Date.now()}.html`
                    };
                    const handle = await window.showSaveFilePicker(opts);
                    const writable = await handle.createWritable();
                    await writable.write(currentRawHTML);
                    await writable.close();
                    showToast('💿 方式6: 另存为成功 (现代API)');
                    return;
                } catch (err) {
                    if (err.name !== 'AbortError') console.warn(err);
                }
            }
            // 降级：使用传统Blob下载
            const blob = new Blob([currentRawHTML], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `card_saveas_${Date.now()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('💿 方式6: 降级另存为完成');
        }

        // 方式7: 弹窗全选复制 (终极兼容)
        function fallbackCopyText(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, text.length);
            let success = false;
            try {
                success = document.execCommand('copy');
            } catch(e) { success = false; }
            document.body.removeChild(textarea);
            if (success) {
                showToast('📄 方式7: 兼容复制成功');
            } else {
                // 终极提示用户手动复制
                alert('无法自动复制，请手动选中下方代码框内容并复制(Ctrl+C)');
                const outputBox = document.getElementById('codeOutput');
                if (outputBox) {
                    const range = document.createRange();
                    range.selectNode(outputBox);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                }
                showToast('请手动复制代码', false);
            }
        }

        // 通用后备复制 (供方式4/5失败时调用)
        function universalCopyFallback(text) {
            fallbackCopyText(text);
        }

        // 监听生成按钮
        generateBtn.addEventListener('click', () => {
            updatePreviewAndCache();
            showToast('✨ 模板已刷新，可使用右侧任意方式导出');
        });

        // 绑定7种导出事件
        downloadBlobBtn.addEventListener('click', downloadAsBlob);
        downloadDataUrlBtn.addEventListener('click', downloadAsDataURL);
        downloadFileSaverBtn.addEventListener('click', downloadFileSaverFallback);
        copyHtmlCodeBtn.addEventListener('click', copyRawCode);
        copyMinifiedBtn.addEventListener('click', copyMinified);
        saveAsHtmlBtn.addEventListener('click', saveAsModern);
        fallbackCopyBtn.addEventListener('click', () => {
            if (!currentRawHTML) updatePreviewAndCache();
            fallbackCopyText(currentRawHTML);
        });

        // 初始化
        function initDefault() {
            if (!keysListTextarea.value) keysListTextarea.value = DEFAULT_KEYS.join('\n');
            if (!targetUrlInput.value) targetUrlInput.value = "https://www.example.com";
            if (!contactLinkInput.value) contactLinkInput.value = "https://qm.qq.com/q/HC7vmzCysM";
            updatePreviewAndCache();
        }
        initDefault();
    })();
</script>
</body>
</html>
